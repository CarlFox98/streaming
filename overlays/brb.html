<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="overlay-theme.css">
<style>

body {
  background: linear-gradient(135deg, var(--bg-2), var(--bg-1), var(--bg-3), var(--bg-4));
  background-size: 400% 400%;
  animation: gradientShift 10s ease infinite;
}

.brb-text {
  font-size: 72px; font-weight: 800;
  color: white;
  text-shadow: 0 0 40px var(--brand-dim);
  margin-bottom: 10px;
  animation: brbPulse 2s ease-in-out infinite;
  will-change: transform, opacity, text-shadow;
}
@keyframes brbPulse {
  0%, 100% { transform: scale(1); opacity: 0.9; text-shadow: 0 0 30px var(--brand-dim); }
  50% { transform: scale(1.03); opacity: 1; text-shadow: 0 0 60px var(--brand-dim); }
}

.subtitle { margin-bottom: 25px; }

.avatar-wrapper { margin-bottom: 20px; }
.avatar-glow { width: 300px; height: 300px; background: radial-gradient(circle, rgba(232,129,62,0.25), transparent 70%); animation-duration: 2.5s; }
@keyframes glowPulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; }
  50% { transform: translate(-50%, -50%) scale(1.25); opacity: 0.7; }
}
.avatar { width: 250px; height: 250px; }
@keyframes avatarBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

@media (prefers-reduced-motion: reduce) {
  body { animation: none; }
  .particle, .scanlines { display: none; }
  .brb-text, .avatar, .avatar-glow, .line { animation: none; }
  .brb-text { text-shadow: 0 0 30px var(--brand-dim); }
}
</style>
</head>
<body>
<div class="particle" style="left:15%;width:5px;height:5px;animation-duration:13s;animation-delay:0s;"></div>
<div class="particle" style="left:30%;width:3px;height:3px;animation-duration:16s;animation-delay:2s;"></div>
<div class="particle" style="left:50%;width:7px;height:7px;animation-duration:11s;animation-delay:3s;"></div>
<div class="particle" style="left:70%;width:4px;height:4px;animation-duration:14s;animation-delay:1s;"></div>
<div class="particle" style="left:85%;width:6px;height:6px;animation-duration:12s;animation-delay:4s;"></div>
<div class="particle" style="left:40%;width:5px;height:5px;animation-duration:15s;animation-delay:2.5s;"></div>
<div class="particle" style="left:75%;width:4px;height:4px;animation-duration:10s;animation-delay:5s;"></div>

<div class="scanlines"></div>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="logo">NeoTheFox98</div>
<div class="brb-text">Be Back Soon</div>
<div class="subtitle">Grab a snack, I'll be right back!</div>

<div class="avatar-wrapper">
  <div class="avatar-glow"></div>
  <img class="avatar" id="avatar" alt="Bean">
</div>

<div class="line"></div>

<div class="bottom-line">
  twitch.tv/<span>neothefox98</span>
</div>

<script>
(function() {
  var base = window.location.href.substring(0, window.location.href.lastIndexOf('/'));
  document.getElementById('avatar').src = base.substring(0, base.lastIndexOf('/')) + '/assets/Bean.png';
})();
</script>
</body>
</html>
